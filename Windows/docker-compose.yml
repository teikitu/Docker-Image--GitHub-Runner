services:
  runner:
    image: teikitu-github-runner-win:latest
    build:
      context: .
      args:
        RUNNER_VERSION: '2.321.0'
        GH_OWNER_ARG: ${GH_OWNER}
        GH_TOKEN_ARG: ${GH_TOKEN}
    environment:
      GH_OWNER_ENV: ${GH_OWNER}
      GH_TOKEN_ENV: ${GH_TOKEN}
      GH_REPOSITORY: ${GH_REPOSITORY}
    deploy:
      resources:
        limits:
          cpus: '1.00'
        reservations:
          cpus: '0.25'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
